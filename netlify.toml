[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[dev]
  targetPort = 3003

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]

# Optional environment variables for PDF question upload processing:
# PDF_OPTIONS_BATCH_SIZE - Number of questions to process concurrently per batch (default: 5)
# PDF_OPTIONS_BATCH_DELAY - Delay in milliseconds between batches (default: 2000)

[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[[edge_functions]]
  path = "/robots.txt"
  function = "robots"

[[edge_functions]]
  path = "/about"
  function = "seo-head"

[[edge_functions]]
  path = "/about/*"
  function = "seo-head"

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"

# CRA dev emits stable, un-hashed paths like /static/js/bundle.js. When served
# through netlify dev, caching those paths can leave the browser with a stale
# Webpack runtime that requests chunks no longer emitted by the dev server.
[[headers]]
  for = "/static/js/bundle.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/static/js/*.chunk.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/static/js/*.hot-update.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/static/css/*.chunk.css"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/static/css/*.hot-update.css"
  [headers.values]
    Cache-Control = "no-store"

# Cache headers for static assets (CRA uses content-hashed filenames)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=604800"
